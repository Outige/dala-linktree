<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Online business card for Tieg O'Sullivan, Business Development Manager at Dala."
    >
    <meta property="og:title" content="Tieg O'Sullivan | Dala">
    <meta
      property="og:description"
      content="Connect with Tieg O'Sullivan, Business Development Manager at Dala."
    >
    <meta property="og:type" content="profile">
    <meta name="twitter:card" content="summary">
    <title>Tieg O'Sullivan | Business Development Manager</title>
    <style>
      :root {
        --bg: #eef1f4;
        --surface: #ffffff;
        --ink: #16202a;
        --muted: #65717d;
        --line: #d7dde3;
        --charcoal: #202933;
        --red: #c81922;
        --red-dark: #94131b;
        --blue: #1f5f8f;
        --green: #2d6f57;
        --shadow: 0 28px 70px rgba(17, 31, 44, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100%;
        margin: 0;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          linear-gradient(120deg, rgba(32, 41, 51, 0.08), transparent 36%),
          linear-gradient(220deg, rgba(200, 25, 34, 0.08), transparent 34%),
          var(--bg);
      }

      a {
        color: inherit;
      }

      .page {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(100%, 980px);
        overflow: hidden;
        border: 1px solid rgba(22, 32, 42, 0.1);
        border-radius: 26px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .profile {
        display: grid;
        grid-template-columns: minmax(0, 0.86fr) minmax(0, 1.14fr);
        min-height: 610px;
      }

      .portrait-panel {
        position: relative;
        min-height: 420px;
        background: var(--charcoal);
      }

      .portrait {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 16%;
      }

      .portrait-panel::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(180deg, rgba(16, 24, 32, 0.02) 42%, rgba(16, 24, 32, 0.68)),
          linear-gradient(90deg, rgba(16, 24, 32, 0.16), transparent 44%);
      }

      .brand-mark {
        position: absolute;
        right: 24px;
        bottom: 24px;
        z-index: 1;
        width: min(42%, 172px);
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(12px);
      }

      .brand-mark img {
        display: block;
        width: 100%;
        height: auto;
      }

      .details {
        display: grid;
        align-content: center;
        gap: 28px;
        padding: clamp(28px, 6vw, 58px);
      }

      .intro {
        display: grid;
        gap: 15px;
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 10px;
        margin: 0;
        color: var(--red);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        width: 28px;
        height: 2px;
        background: currentColor;
        content: "";
      }

      h1 {
        max-width: 10ch;
        margin: 0;
        font-size: clamp(3rem, 8vw, 5.8rem);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 0.92;
      }

      .title {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 2.4vw, 1.28rem);
        font-weight: 650;
        line-height: 1.45;
      }

      .contact-list {
        display: grid;
        gap: 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .contact-link {
        display: grid;
        grid-template-columns: 46px 1fr;
        align-items: center;
        gap: 14px;
        min-height: 64px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 16px;
        color: var(--ink);
        text-decoration: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      .contact-link:hover,
      .contact-link:focus-visible {
        border-color: rgba(200, 25, 34, 0.42);
        box-shadow: 0 16px 28px rgba(17, 31, 44, 0.1);
        transform: translateY(-2px);
      }

      .contact-link:focus-visible,
      .primary-action:focus-visible,
      .secondary-action:focus-visible {
        outline: 4px solid rgba(31, 95, 143, 0.28);
        outline-offset: 3px;
      }

      .icon {
        display: grid;
        width: 46px;
        height: 46px;
        place-items: center;
        border-radius: 13px;
        background: #f2f4f7;
        color: var(--charcoal);
      }

      .contact-label,
      .contact-value {
        display: block;
      }

      .contact-label {
        color: var(--muted);
        font-size: 0.73rem;
        font-weight: 760;
        letter-spacing: 0.08em;
        line-height: 1.1;
        text-transform: uppercase;
      }

      .contact-value {
        margin-top: 4px;
        font-size: clamp(0.94rem, 2.2vw, 1.05rem);
        font-weight: 720;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .primary-action,
      .secondary-action {
        display: inline-flex;
        min-height: 52px;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 0.94rem;
        font-weight: 800;
        line-height: 1.1;
        text-align: center;
        text-decoration: none;
        transition:
          box-shadow 160ms ease,
          transform 160ms ease,
          background-color 160ms ease;
      }

      .primary-action {
        border: 1px solid var(--red-dark);
        background: var(--red);
        color: #ffffff;
        box-shadow: 0 14px 28px rgba(200, 25, 34, 0.22);
      }

      .primary-action:hover,
      .primary-action:focus-visible {
        background: var(--red-dark);
        box-shadow: 0 18px 34px rgba(200, 25, 34, 0.28);
        transform: translateY(-2px);
      }

      .secondary-action {
        border: 1px solid var(--line);
        background: #f8fafc;
        color: var(--charcoal);
      }

      .secondary-action:hover,
      .secondary-action:focus-visible {
        background: #ffffff;
        box-shadow: 0 14px 26px rgba(17, 31, 44, 0.1);
        transform: translateY(-2px);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 0;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .meta span {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .meta span + span::before {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--red);
        content: "";
      }

      svg {
        display: block;
        flex: 0 0 auto;
      }

      @media (max-width: 760px) {
        .page {
          display: block;
          padding: 0;
        }

        .card {
          min-height: 100vh;
          border: 0;
          border-radius: 0;
        }

        .profile {
          grid-template-columns: 1fr;
          min-height: 100vh;
        }

        .portrait-panel {
          min-height: clamp(330px, 58vh, 520px);
        }

        .brand-mark {
          width: 148px;
          right: 18px;
          bottom: 18px;
        }

        .details {
          align-content: start;
          gap: 24px;
          padding: 30px 20px 26px;
        }

        h1 {
          max-width: 9ch;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 390px) {
        .contact-link {
          grid-template-columns: 42px 1fr;
          gap: 12px;
          padding: 9px;
        }

        .icon {
          width: 42px;
          height: 42px;
        }

        .primary-action,
        .secondary-action {
          padding-right: 12px;
          padding-left: 12px;
        }
      }
    </style>
  </head>
  <body>

            </div>

            <p class="meta">
              <span>Business Development</span>

          </section>
        </div>
      </article>
    </main>
  </body>
</html>
